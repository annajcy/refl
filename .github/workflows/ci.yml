name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "conan>=2.0"

      - name: Detect Conan profile
        shell: bash
        run: conan profile detect --force

      - name: Conan install
        shell: bash
        run: >
          conan install .
          --output-folder=build
          --build=missing
          -s build_type=Release
          -s compiler.cppstd=23
          -o "&:with_tests=True"
          -o "&:with_examples=True"

      - name: Configure
        shell: bash
        run: cmake --preset conan-release

      - name: Build
        shell: bash
        run: cmake --build --preset conan-release

      - name: Test
        shell: bash
        run: ctest --preset conan-release --output-on-failure

      - name: Conan create (package + test_package)
        shell: bash
        run: conan create . --build=missing -s build_type=Release -s compiler.cppstd=23
